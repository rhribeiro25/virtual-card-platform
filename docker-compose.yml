services:

  api:
    container_name: api
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # PostgreSQL
      DATABASE_HOST: pgsql
      DATABASE_PORT: 5432
      DATABASE_NAME: virtual-card-platform
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      # MongoDB
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DATABASE: virtual-card-platform
    depends_on:
      pgsql:
        condition: service_healthy
      mongo:
        condition: service_healthy
    volumes:
      - ./.data/app:/var/lib/app
    networks:
      - app-net

  pgsql:
    container_name: pgsql
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: virtual-card-platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./.data/pgsql:/var/lib/postgresql/data
    networks:
      - app-net

  dbeaver:
    container_name: dbeaver
    image: dbeaver/cloudbeaver:latest
    restart: unless-stopped
    ports:
      - "8978:8978"
    environment:
      CB_ADMIN_NAME: cbadmin
      CB_ADMIN_PASSWORD: cbadmin
      CB_SERVER_HTTP_PORT: 8978
      CB_SERVER_HOST: 0.0.0.0
    depends_on:
      pgsql:
        condition: service_healthy
    volumes:
      - ./.data/dbeaver:/opt/cloudbeaver/workspace
    networks:
      - app-net

  mongo:
    container_name: mongo
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongodb
      MONGO_INITDB_ROOT_PASSWORD: mongodb
      MONGO_INITDB_DATABASE: virtual-card-platform
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./.data/mongo:/data/db
    networks:
      - app-net

  mongo-express:
    container_name: mongo-express
    image: mongo-express:1.0.0
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: mongodb
      ME_CONFIG_MONGODB_ADMINPASSWORD: mongodb
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_AUTH_DATABASE: admin
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./.data/mongo_express:/data/config
    networks:
      - app-net

  redis:
    container_name: redis
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./.data/redis:/data
    networks:
      - app-net

  redis-ui:
    container_name: redis-ui
    image: rediscommander/redis-commander:latest
    restart: unless-stopped
    environment:
      REDIS_HOSTS: '{"local":{"host":"redis","port":6379,"password":""}}'
    ports:
      - "8081:8081"
    depends_on:
      - redis
    volumes:
      - ./.data/redis_ui:/redis-commander
    networks:
      - app-net

  zookeeper:
    container_name: zookeeper
    image: zookeeper:3.9.1
    restart: unless-stopped
    ports:
      - "2181:2181"
    volumes:
      - ./.data/zookeeper:/data
    networks:
      - app-net

  kafka:
    container_name: kafka
    image: wurstmeister/kafka:2.13-2.8.1
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    volumes:
      - ./.data/kafka:/kafka
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  .data:
