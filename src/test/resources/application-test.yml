spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:virtual_card_platform_test
    driver-class-name: org.h2.Driver
    username: sa
    password: 123456

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    hibernate:
      ddl-auto: none

  flyway:
    enabled: true
    locations: classpath:db/migration
