spring:
  config:
    activate:
      on-profile: docker

  data:
    mongodb:
      host: mongo
      port: 27017
      database: virtual-card-platform
      username: mongodb
      password: mongodb
      authentication-database: admin

  datasource:
    url: jdbc:postgresql://pgsql:5432/virtual-card-platform
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    org.springframework.batch: INFO
    org.springframework.jdbc.core: INFO
    org.hibernate.SQL: OFF
