spring:
  config:
    activate:
      on-profile: local

  data:
    mongodb:
      uri: mongodb://localhost:27017/virtual-card-platform

  datasource:
    url: jdbc:postgresql://localhost:5432/virtual-card-platform
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    org.springframework.batch: INFO
    org.springframework.jdbc.core: INFO
    org.hibernate.SQL: OFF
