spring:
  config:
    activate:
      on-profile: local
  cache:
    type: redis
    redis:
      time-to-live: 10m
      cache-null-values: false
      repositories:
        enabled: false
  devtools:
    restart:
      enabled: false

  data:
    mongodb:
      host: localhost
      port: 27017
      database: virtual-card-platform
      username: mongodb
      password: mongodb
      authentication-database: admin
    redis:
      host: localhost
      port: 6379
      timeout: 2s

  datasource:
    url: jdbc:postgresql://localhost:5432/virtual-card-platform
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    org.springframework.batch: INFO
    org.springframework.jdbc.core: INFO
    org.hibernate.SQL: OFF
