########################################################################################################################
#APPLICATION
########################################################################################################################
spring.application.name=virtual-card-platform
spring.messages.basename=messages
spring.web.resources.add-mappings=false
spring.messages.encoding=UTF-8
server.port=${PORT:9090}
########################################################################################################################
#SPRING DATA
########################################################################################################################
spring.datasource.url=jdbc:h2:mem:virtual_card_platform
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=renan
spring.datasource.password=
# Hibernate dialect specific to H2 database
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Enables SQL query logging to the console (optional)
spring.jpa.show-sql=true
# Enables Hibernate JDBC batching to optimize Spring Batch saveAll operations and reduce database round-trips.
spring.jpa.properties.hibernate.jdbc.batch_size=2000
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false
# Automatically creates or updates the database schema
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
########################################################################################################################
#SPRING BATCH
########################################################################################################################
#spring.batch.jdbc.initialize-schema=ALWAYS
#spring.batch.job.enabled=false
########################################################################################################################
# H2 ACCESS VIEW
########################################################################################################################
# http://localhost:8080/h2-console (JDBC URL: jdbc:h2:mem:virtual_card_platform)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
