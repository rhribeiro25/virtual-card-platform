########################################################################################################################
# APPLICATION
########################################################################################################################
spring.application.name=virtual-card-platform
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.web.resources.add-mappings=false
server.port=${PORT:9090}

########################################################################################################################
# MONGODB (STAGING / RAW DATA)
########################################################################################################################
spring.data.mongodb.uri=mongodb://${MONGO_HOST:mongo}:${MONGO_PORT:27017}/${MONGO_DATABASE:virtual-card-platform}

########################################################################################################################
# DATASOURCE - POSTGRESQL (DOCKER)
########################################################################################################################
spring.datasource.url=jdbc:postgresql://${DATABASE_HOST:pgsql}:${DATABASE_PORT:5432}/${DATABASE_NAME:virtual-card-platform}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

########################################################################################################################
# JPA / HIBERNATE
########################################################################################################################
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none

# Batch optimizations
spring.jpa.properties.hibernate.jdbc.batch_size=1000
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

########################################################################################################################
# FLYWAY
########################################################################################################################
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

########################################################################################################################
# SPRING BATCH
########################################################################################################################
#spring.batch.jdbc.initialize-schema=ALWAYS
#spring.batch.job.enabled=false

########################################################################################################################
# LOGGING (PROD-SAFE DEFAULT)
########################################################################################################################
logging.level.org.springframework.batch=INFO
logging.level.org.springframework.jdbc.core=INFO
logging.level.org.hibernate.SQL=OFF
